name: Deploy to GitHub Pages

on:
  push:
    branches: [stable]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  purge-cache:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Purge Cloudflare Cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"hosts":["vertexmath.org"]}'

      - name: Verify cache purge
        run: |
          echo "Waiting 5s for purge propagation..."
          sleep 5
          echo "--- Checking vertexmath.org ---"
          HEADERS=$(curl -sI "https://vertexmath.org/" 2>&1)
          echo "$HEADERS"
          CF_STATUS=$(echo "$HEADERS" | grep -i "cf-cache-status" | tr -d '\r')
          echo ""
          echo "CF-Cache-Status: $CF_STATUS"
          if echo "$CF_STATUS" | grep -qi "HIT"; then
            echo "::warning::CF-Cache-Status is HIT immediately after purge — purge may not have propagated yet"
          else
            echo "Cache purge verified (status is not HIT)"
          fi
